<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Olive Mukabayundo — Portfolio</title>
  
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --navy: #0f1a3a;
      --navy-light: #162044;
      --white: #ffffff;
      --white-muted: rgba(255, 255, 255, 0.7);
      --accent: #4a90d9;
      --nav-height: 70px;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--navy);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--nav-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      background-color: var(--navy);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .nav-brand {
      font-size: 15px;
      font-weight: 500;
      color: var(--white);
      text-decoration: none;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .nav-links {
      display: flex;
      list-style: none;
      gap: 40px;
    }

    .nav-links a {
      color: var(--white-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.03em;
      transition: color 0.2s;
      position: relative;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -4px;
      width: 0;
      height: 1px;
      background: var(--white);
      transition: width 0.25s ease;
    }

    .nav-links a:hover {
      color: var(--white);
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    .nav-links a.active {
      color: var(--white);
    }

    .nav-links a.active::after {
      width: 100%;
    }

    
    main {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 0 48px;
    }

    .hero {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 40px;
      padding: 80px 0;
    }

    .hero-text {
      max-width: 480px;
      animation: fadeUp 0.8s ease both;
    }

    .hero-greeting {
      font-size: 13px;
      font-weight: 400;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.1s both;
    }

    .hero-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(32px, 4vw, 52px);
      font-weight: 600;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.2s both;
    }

    .hero-tagline {
      font-size: clamp(15px, 2vw, 18px);
      font-weight: 300;
      color: var(--white-muted);
      line-height: 1.7;
      margin-bottom: 36px;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.35s both;
    }

    .hero-tagline em {
      font-style: normal;
      color: var(--white);
      font-weight: 400;
    }

    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.3);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.05em;
      border-radius: 2px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.5s both;
    }

    .hero-cta:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.6);
    }

   
    .hero-photo {
      flex-shrink: 0;
      opacity: 0;
      animation: fadeIn 1s ease 0.4s both;
    }

    .photo-frame {
      width: 240px;
      height: 240px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid rgba(255, 255, 255, 0.15);
      outline: 1px solid rgba(74, 144, 217, 0.3);
      outline-offset: 6px;
    }

    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    
    .photo-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1e3060 0%, #2a4080 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 600;
      color: rgba(255,255,255,0.4);
      font-family: 'Playfair Display', serif;
    }

    footer {
      text-align: center;
      padding: 20px 48px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 0.04em;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.96); }
      to   { opacity: 1; transform: scale(1); }
    }

    
    @media (max-width: 768px) {
      nav {
        padding: 0 24px;
        flex-wrap: wrap;
        height: auto;
        padding-top: 16px;
        padding-bottom: 16px;
        gap: 12px;
      }

      .nav-links {
        gap: 20px;
      }

      main {
        padding: 0 24px;
      }

      .hero {
        flex-direction: column-reverse;
        text-align: center;
        padding: 48px 0 40px;
      }

      .photo-frame {
        width: 180px;
        height: 180px;
      }

      footer {
        padding: 16px 24px;
      }
    }
  </style>
</head>
<body>

  <nav>
    <a href="home.html" class="nav-brand">My Information</a>
    <ul class="nav-links">
      <li><a href="home.html" class="active">Home</a></li>
      <li><a href="about.html">About Me</a></li>
      <li><a href="projects.html">Project</a></li>
      <li><a href="resume.html">Resume</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <main>
    <section class="hero">
      <div class="hero-text">
        <p class="hero-greeting">Front-end Developer</p>
        <h1 class="hero-name">Hello, I'm Olive<br>Mukabayundo</h1>
        <p class="hero-tagline">
          Welcome to my journey of becoming a<br>
          <em>Front-end Developer.</em>
        </p>
        
      </div>

      <div class="hero-photo">
        <div class="photo-frame">
          
            <img src="photo.jpeg"  />
          
          <div class="photo-placeholder">OM</div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    @2026 my Information
  </footer>

</body>
</html>
